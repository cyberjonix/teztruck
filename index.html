<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TezTruck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0C0C0C;
  --bg2:#161616;
  --bg3:#202020;
  --or:#F5820A;
  --or-dim:rgba(245,130,10,0.12);
  --or-glow:rgba(245,130,10,0.2);
  --tx:#F2EDE6;
  --tx2:#888;
  --brd:rgba(255,255,255,0.07);
  --brd-or:rgba(245,130,10,0.25);
  --gr:#27C96F;
  --gr-dim:rgba(39,201,111,0.1);
  --re:#E8453C;
  --re-dim:rgba(232,69,60,0.1);
  --bl:#4C8EF5;
  --pu:#9B6EF5;
  --nav-h:64px;
  --top-h:56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;}

/* ═══ APP SHELL ═══ */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* TOP BAR */
.topbar{
  height:var(--top-h);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(12,12,12,0.95);
  border-bottom:1px solid var(--brd);
  backdrop-filter:blur(12px);
  position:relative;z-index:10;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:.02em;}
.logo em{color:var(--or);font-style:normal;}
.lang-row{display:flex;gap:2px;background:var(--bg3);border-radius:8px;padding:3px;}
.lb{font-size:.65rem;font-weight:700;padding:4px 9px;border-radius:5px;border:none;cursor:pointer;background:transparent;color:var(--tx2);transition:all .15s;line-height:1;}
.lb.on{background:var(--or);color:#000;}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .22s ease,transform .22s ease;}
.screen.active{opacity:1;pointer-events:auto;transform:translateY(0);}

/* ═══ BOTTOM NAV ═══ */
.bottomnav{
  height:var(--nav-h);flex-shrink:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:rgba(12,12,12,0.97);
  border-top:1px solid var(--brd);
  backdrop-filter:blur(12px);
  padding-bottom:env(safe-area-inset-bottom);
}
.navbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;color:var(--tx2);transition:color .15s;position:relative;}
.navbtn.on{color:var(--or);}
.navbtn .ni{font-size:1.3rem;transition:transform .2s;}
.navbtn.on .ni{transform:scale(1.15);}
.navbtn .nl{font-size:.58rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:color .15s;}
.navbtn::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--or);border-radius:0 0 2px 2px;transition:width .2s;}
.navbtn.on::after{width:32px;}

/* ═══ SCREEN 1: PATH ═══ */
.s-path{padding:0 0 24px;}

/* Hero strip */
.path-hero{
  padding:28px 20px 24px;
  background:linear-gradient(160deg, var(--bg2) 0%, var(--bg) 100%);
  border-bottom:1px solid var(--brd);
  position:relative;overflow:hidden;
}
.path-hero::before{
  content:'';position:absolute;right:-40px;top:-60px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,130,10,0.08) 0%,transparent 70%);
}
.hero-eyebrow{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--or);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.hero-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--or);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.path-hero h1{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:900;line-height:1;letter-spacing:-.01em;margin-bottom:8px;}
.path-hero h1 em{color:var(--or);font-style:normal;}
.path-hero p{font-size:.82rem;color:var(--tx2);line-height:1.6;max-width:340px;}

/* Stage list */
.stages-list{padding:16px 16px 0;}
.stage-item{
  background:var(--bg2);border:1px solid var(--brd);border-radius:14px;
  margin-bottom:10px;overflow:hidden;
  transition:border-color .2s;
}
.stage-item.open{border-color:var(--brd-or);}
.stage-trigger{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
.stage-trigger:active{background:rgba(255,255,255,.03);}
.stnum{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;color:var(--tx2);min-width:28px;transition:color .2s;}
.stage-item.open .stnum{color:var(--or);}
.stem{font-size:1.2rem;flex-shrink:0;}
.stinfo{flex:1;min-width:0;}
.stname{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;line-height:1.2;}
.stdesc{font-size:.68rem;color:var(--tx2);margin-top:2px;}
.stbadge{font-size:.55rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:100px;flex-shrink:0;}
.b-start{background:rgba(39,201,111,0.15);color:var(--gr);}
.b-grow{background:rgba(76,142,245,0.15);color:var(--bl);}
.b-biz{background:var(--or-dim);color:var(--or);}
.b-scale{background:rgba(155,110,245,0.15);color:var(--pu);}
.b-help{background:var(--re-dim);color:var(--re);}
.stchev{color:var(--tx2);font-size:.8rem;flex-shrink:0;transition:transform .25s;}
.stage-item.open .stchev{transform:rotate(180deg);color:var(--or);}

/* Stage body */
.stage-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
.stage-item.open .stage-body{max-height:800px;}
.stage-body-inner{padding:0 16px 16px;border-top:1px solid var(--brd);}
.svcs{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.svc-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:10px;}
.svc-em{font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.svc-txt{}
.svc-n{font-size:.8rem;font-weight:700;line-height:1.2;}
.svc-d{font-size:.7rem;color:var(--tx2);margin-top:2px;line-height:1.4;}
.stage-cta-btn{
  display:block;width:100%;margin-top:12px;
  background:var(--or);color:#000;
  font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:13px;border-radius:10px;border:none;cursor:pointer;text-align:center;
  transition:opacity .15s;
}
.stage-cta-btn:active{opacity:.8;}
.stage-cta-btn.red{background:var(--re);color:#fff;}

/* Violations standalone card */
.violations-card{
  margin:0 16px 16px;
  background:var(--re-dim);border:1px solid rgba(232,69,60,0.25);
  border-radius:14px;padding:16px;
  display:flex;gap:12px;align-items:flex-start;
}
.vc-em{font-size:1.4rem;flex-shrink:0;}
.vc-h{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;color:var(--re);margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.vc-badge{font-size:.55rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:100px;background:var(--re);color:#fff;}
.vc-d{font-size:.72rem;color:var(--tx2);line-height:1.5;}
.vc-btn{display:inline-block;margin-top:8px;background:var(--re);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;}

/* ═══ SCREEN 2: TRUCKS ═══ */
.s-trucks{display:flex;flex-direction:column;}

/* Truck list panel */
.truck-panel{padding:16px 16px 0;}
.truck-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.tp-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:900;}
.tp-sub{font-size:.65rem;color:var(--tx2);margin-top:1px;}
.trucks-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
.trucks-scroll::-webkit-scrollbar{display:none;}

/* Truck card */
.tcard{
  width:155px;flex-shrink:0;border-radius:12px;border:1.5px solid var(--brd);
  background:var(--bg2);overflow:hidden;cursor:pointer;
  transition:border-color .15s,transform .15s;
  -webkit-user-select:none;
}
.tcard:active{transform:scale(.97);}
.tcard.sel{border-color:var(--or);}
.tcard.sold{opacity:.5;cursor:default;}
.tcard-img{width:100%;aspect-ratio:4/3;background:var(--bg3);overflow:hidden;position:relative;}
.tcard-img img{width:100%;height:100%;object-fit:cover;display:block;}
.tcard-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#2a2a2a;}
.tcard-stag{position:absolute;top:5px;left:5px;font-size:.52rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;}
.st-available{background:rgba(39,201,111,0.2);color:var(--gr);}
.st-pending{background:var(--or-dim);color:var(--or);}
.st-sold{background:rgba(255,255,255,.07);color:var(--tx2);}
.tcard-sel-ring{position:absolute;inset:0;border:2px solid var(--or);pointer-events:none;}
.tcard-check{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--or);color:#000;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;}
.tcard-body{padding:9px 10px 11px;}
.tcard-name{font-size:.72rem;font-weight:700;line-height:1.2;margin-bottom:2px;}
.tcard-det{font-size:.6rem;color:var(--tx2);margin-bottom:5px;line-height:1.3;}
.tcard-wk{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;color:var(--or);line-height:1;}
.tcard-wk span{font-size:.58rem;color:var(--tx2);font-weight:600;}
.tcard-price{font-size:.58rem;color:var(--tx2);margin-top:1px;}

/* Divider */
.panel-div{height:1px;background:var(--brd);margin:0 16px;}

/* Calculator area */
.calc-area{}

/* Placeholder */
.calc-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:200px;text-align:center;padding:32px 20px;}
.calc-empty-icon{font-size:2.2rem;margin-bottom:10px;opacity:.4;}
.calc-empty-text{font-size:.8rem;color:var(--tx2);line-height:1.6;}
.calc-empty-arrow{font-size:1rem;color:var(--tx2);margin-top:8px;opacity:.4;animation:bob 1.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* Net hero */
.net-hero{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:14px 16px;
  background:var(--gr-dim);
  border-bottom:1px solid rgba(39,201,111,0.15);
}
.nh-l .nh-lbl{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gr);margin-bottom:2px;}
.nh-l .nh-val{font-family:'Barlow Condensed',sans-serif;font-size:2.4rem;font-weight:900;color:var(--gr);line-height:1;}
.nh-r{text-align:right;}
.nh-r .nh-lbl{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx2);margin-bottom:2px;}
.nh-r .nh-val{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:var(--or);line-height:1;}
.nh-r .nh-sub{font-size:.58rem;color:var(--tx2);}

/* Truck chip */
.truck-chip{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--brd-or);background:var(--or-dim);}
.tc-name{font-size:.8rem;font-weight:700;}
.tc-det{font-size:.62rem;color:var(--tx2);margin-top:1px;}

/* Sliders */
.sliders-block{padding:14px 16px;}
.sl-row{margin-bottom:14px;}
.sl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.sl-label{font-size:.73rem;font-weight:600;color:var(--tx2);}
.sl-val{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;color:var(--tx);}
input[type=range]{width:100%;height:4px;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:3px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--or);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--or-dim);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--or);border:3px solid var(--bg);cursor:pointer;}
.sl-range{display:flex;justify-content:space-between;font-size:.58rem;color:var(--tx2);margin-top:3px;}
.sl-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sl-metric{background:var(--bg3);border-radius:8px;padding:8px 10px;}
.sl-metric-lbl{font-size:.56rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tx2);margin-bottom:2px;}
.sl-metric-val{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;}
.divline{border:none;border-top:1px solid var(--brd);margin:14px 0;}

/* Breakdown */
.bk-title{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:8px;}
.bk-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.78rem;}
.bk-l{color:var(--tx2);}
.bk-v{font-weight:700;}
.bk-pos{color:var(--gr);}
.bk-neg{color:var(--re);}
.calc-note{font-size:.62rem;color:var(--tx2);text-align:center;margin-top:4px;padding-bottom:8px;}

/* ═══ SCREEN 3: CONTACT ═══ */
.s-contact{padding:0;}
.contact-hero{
  padding:32px 20px 28px;
  background:linear-gradient(160deg,var(--bg2),var(--bg));
  border-bottom:1px solid var(--brd);
  text-align:center;
}
.contact-hero h2{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:900;margin-bottom:8px;}
.contact-hero h2 em{color:var(--or);font-style:normal;}
.contact-hero p{font-size:.82rem;color:var(--tx2);line-height:1.6;}
.contact-list{padding:20px 16px;display:flex;flex-direction:column;gap:10px;}
.contact-btn{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;border-radius:14px;
  text-decoration:none;border:none;cursor:pointer;
  transition:opacity .15s,transform .1s;
  -webkit-user-select:none;
}
.contact-btn:active{opacity:.85;transform:scale(.98);}
.contact-btn.phone{background:var(--or);color:#000;}
.contact-btn.tg{background:#229ED9;color:#fff;}
.contact-btn.wa{background:#25D366;color:#fff;}
.cb-icon{font-size:1.4rem;flex-shrink:0;}
.cb-text{}
.cb-label{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:.02em;}
.cb-sub{font-size:.7rem;opacity:.75;margin-top:1px;}
.contact-info{padding:0 16px 24px;display:flex;flex-direction:column;gap:8px;}
.info-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;}
.info-icon{font-size:1rem;flex-shrink:0;}
.info-text{font-size:.78rem;color:var(--tx2);}
.info-text strong{color:var(--tx);font-weight:600;}

/* ═══ SKELETON ═══ */
.skel{width:155px;flex-shrink:0;border-radius:12px;border:1px solid var(--brd);background:var(--bg2);overflow:hidden;}
.skel-img{width:100%;aspect-ratio:4/3;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-body{padding:9px 10px 11px;display:flex;flex-direction:column;gap:6px;}
.skel-line{height:9px;border-radius:4px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-line.w60{width:60%;}
.skel-line.w40{width:40%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Preview */
.truck-preview-wrap{display:none;margin:0 16px 12px;border-radius:12px;overflow:hidden;border:1px solid var(--brd);}
.truck-preview-wrap.vis{display:block;}
.prev-img-wrap{width:100%;aspect-ratio:16/7;background:var(--bg3);overflow:hidden;position:relative;}
.prev-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.prev-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;color:#222;}
.pnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.pnav.prev{left:7px;}.pnav.next{right:7px;}
.pdots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
.pdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;}
.pdot.on{background:var(--or);}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">TEZ<em>TRUCK</em></div>
    <div class="lang-row">
      <button class="lb on" id="lb-ru" onclick="setLang('ru')">🇷🇺 РУ</button>
      <button class="lb" id="lb-en" onclick="setLang('en')">🇺🇸 EN</button>
      <button class="lb" id="lb-tg" onclick="setLang('tg')">🇹🇯 ТЧ</button>
      <button class="lb" id="lb-uz" onclick="setLang('uz')">🇺🇿 ЎЗ</button>
    </div>
  </div>

  <!-- SCREENS -->
  <div class="screens">

    <!-- ① PATH -->
    <div class="screen active" id="sc-path">
      <div class="s-path">
        <div class="path-hero">
          <div class="hero-eyebrow" data-i="heroEyebrow"></div>
          <h1 data-ih="heroTitle"></h1>
          <p data-i="heroSub"></p>
        </div>

        <div class="stages-list">

          <!-- Stage 1 -->
          <div class="stage-item" id="st1">
            <div class="stage-trigger" onclick="toggleStage('st1')">
              <div class="stnum">01</div>
              <div class="stem">🎓</div>
              <div class="stinfo">
                <div class="stname" data-i="s1name"></div>
                <div class="stdesc" data-i="s1desc"></div>
              </div>
              <div class="stbadge b-start" data-i="tagStart"></div>
              <div class="stchev">▼</div>
            </div>
            <div class="stage-body">
              <div class="stage-body-inner">
                <div class="svcs">
                  <div class="svc-row"><div class="svc-em">📋</div><div class="svc-txt"><div class="svc-n" data-i="s1svc1n"></div><div class="svc-d" data-i="s1svc1d"></div></div></div>
                  <div class="svc-row"><div class="svc-em">🏢</div><div class="svc-txt"><div class="svc-n" data-i="s1svc2n"></div><div class="svc-d" data-i="s1svc2d"></div></div></div>
                  <div class="svc-row"><div class="svc-em">🩺</div><div class="svc-txt"><div class="svc-n" data-i="s1svc3n"></div><div class="svc-d" data-i="s1svc3d"></div></div></div>
                </div>
                <button class="stage-cta-btn" onclick="goContact()" data-i="s1cta"></button>
              </div>
            </div>
          </div>

          <!-- Stage 2 -->
          <div class="stage-item" id="st2">
            <div class="stage-trigger" onclick="toggleStage('st2')">
              <div class="stnum">02</div>
              <div class="stem">🚛</div>
              <div class="stinfo">
                <div class="stname" data-i="s2name"></div>
                <div class="stdesc" data-i="s2desc"></div>
              </div>
              <div class="stbadge b-grow" data-i="tagGrow"></div>
              <div class="stchev">▼</div>
            </div>
            <div class="stage-body">
              <div class="stage-body-inner">
                <div class="svcs">

let lang='ru';
function t(k){return T[lang][k]||T.ru[k]||k;}
function setLang(l){
  lang=l;
  ['ru','en','tg','uz'].forEach(x=>{
    document.getElementById('lb-'+x).classList.toggle('on',x===l);
  });
  document.querySelectorAll('[data-i]').forEach(el=>el.textContent=t(el.getAttribute('data-i')));
  document.querySelectorAll('[data-ih]').forEach(el=>el.innerHTML=t(el.getAttribute('data-ih')));
  renderTrucks();
  if(selId){const tr=trucks.find(x=>x.id===selId);if(tr)renderCalc(tr);}
  else showCalcEmpty();
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sc-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('on');
  curScreen=name;
}
function goTrucks(){showScreen('trucks');}
function goContact(){showScreen('contact');}

function toggleStage(id){
  const el=document.getElementById(id);
  const isOpen=el.classList.contains('open');

const SB_URL='https://wuyuhxddswxrrzquogsh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1eXVoeGRkc3d4cnJ6cXVvZ3NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzgwNjUsImV4cCI6MjA5MjkxNDA2NX0.Sk29BBsI7NUoRBFXOoIMvo8R1oVDfdmQELnye0NyEkc';
const TABLE='trucks';const BUCKET='truck-photos';
const READY=!SB_URL.includes('ТВОЙ');
async function sb(path,opts={}){
  const r=await fetch(SB_URL+path,{...opts,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const ct=r.headers.get('content-type')||'';
  return ct.includes('json')?r.json():r.text();
}
const dbGet=()=>sb(`/rest/v1/${TABLE}?order=sort_order.asc,created_at.asc`);

let trucks=[],selId=null,pidx=0;

async function loadTrucks(){
  if(!READY){loadDemo();return;}
  try{trucks=await dbGet()||[];renderTrucks();}
  catch(e){loadDemo();}
}
function loadDemo(){
  trucks=[
    {id:'d1',name:'2020 Kenworth T680',detail:'500HP Paccar MX-13 · 12-Spd Auto',price:85000,status:'available',photos:[]},
    {id:'d2',name:'2019 Peterbilt 579',detail:'455HP Paccar MX-13 · 10-Spd Auto',price:72000,status:'available',photos:[]},
    {id:'d3',name:'2021 Freightliner Cascadia',detail:'500HP Detroit DD15 · 12-Spd Auto',price:95000,status:'available',photos:[]},
    {id:'d4',name:'2018 Volvo VNL 860',detail:'475HP D13 · Automated Manual',price:64000,status:'pending',photos:[]}
  ];
  renderTrucks();
}

function fmt(n){return'$'+Math.round(n).toLocaleString();}
function stLbl(s){return t({available:'sAvail',pending:'sPend',sold:'sSold'}[s]||s);}

function renderTrucks(){
  const sc=document.getElementById('trucksScroll');
  sc.innerHTML='';
  trucks.forEach(truck=>{
    const isSel=selId===truck.id;
    const wk=(truck.price-10000)/52;
    const ph=(truck.photos||[])[0];
    const phHTML=ph?`<img src="${ph}" alt="${truck.name}" onerror="this.parentNode.innerHTML='<div class=tcard-ph>🚛</div>'">`:'<div class="tcard-ph">🚛</div>';
    const card=document.createElement('div');
    card.className='tcard'+(truck.status==='sold'?' sold':'')+(isSel?' sel':'');
    card.onclick=()=>pick(truck.id);
    card.innerHTML=`
      <div class="tcard-img">${phHTML}
        <div class="tcard-stag st-${truck.status}">${stLbl(truck.status)}</div>
        ${isSel?'<div class="tcard-sel-ring"></div><div class="tcard-check">✓</div>':''}
      </div>
      <div class="tcard-body">
        <div class="tcard-name">${truck.name}</div>
        <div class="tcard-det">${truck.detail}</div>
        <div class="tcard-wk">${fmt(wk)}<span>${t('colWk')}</span></div>
        <div class="tcard-price">${fmt(truck.price)}</div>
      </div>`;
    sc.appendChild(card);
  });
}

function pick(id){
  const truck=trucks.find(x=>x.id===id);
  if(!truck||truck.status==='sold')return;
  selId=truck.id;pidx=0;
  renderTrucks();
  renderPreview(truck);
  renderCalc(truck);
}

function renderPreview(truck){
  const photos=truck.photos||[];
  const w=document.getElementById('previewImgWrap');
  const wrap=document.getElementById('previewWrap');
  const idx=Math.min(pidx,Math.max(0,photos.length-1));
  if(photos.length){
    const nav=photos.length>1?`<button class="pnav prev" onclick="pNav(-1)">❮</button><button class="pnav next" onclick="pNav(1)">❯</button><div class="pdots">${photos.map((_,i)=>`<div class="pdot${i===idx?' on':''}" onclick="pGo(${i})"></div>`).join('')}</div>`:'';
    w.innerHTML=`<img src="${photos[idx]}" alt="${truck.name}">${nav}`;
  }else{w.innerHTML='<div class="prev-ph">🚛</div>';}
  wrap.classList.add('vis');
}
function pNav(d){const tr=trucks.find(x=>x.id===selId);if(!tr||!tr.photos.length)return;pidx=(pidx+d+tr.photos.length)%tr.photos.length;renderPreview(tr);}
function pGo(i){pidx=i;const tr=trucks.find(x=>x.id===selId);if(tr)renderPreview(tr);}

function showCalcEmpty(){
  document.getElementById('calcArea').innerHTML=`<div class="calc-empty"><div class="calc-empty-icon">☝️</div><div class="calc-empty-text">${t('calcHint')}</div><div class="calc-empty-arrow">↑</div></div>`;
}

const DG=12000,DDi=1800,DT=300;
function renderCalc(truck){
  const area=document.getElementById('calcArea');
  const dpDef=10000;
  function c(dp,gr,di,to){const rem=truck.price-dp,wl=rem/52,f10=gr*.1;return{wl,f10,net:gr-f10-600-di-to-wl,rem};}
  const r0=c(dpDef,DG,DDi,DT);
  area.innerHTML=`
    <div class="truck-chip"><div class="tc-name">${truck.name}</div><div class="tc-det">${truck.detail}</div></div>
    <div class="net-hero">
      <div class="nh-l"><div class="nh-lbl">${t('netLbl')}</div><div class="nh-val" id="rn">${fmt(r0.net)}</div></div>
      <div class="nh-r"><div class="nh-lbl">${t('wkLbl')}</div><div class="nh-val" id="rlh">${fmt(r0.wl)}</div><div class="nh-sub">${t('colWk')}</div></div>
    </div>
    <div class="sliders-block">
      <div class="sl-metrics">
        <div class="sl-metric"><div class="sl-metric-lbl">${t('balLbl')}</div><div class="sl-metric-val" id="bv">${fmt(r0.rem)}</div></div>
        <div class="sl-metric"><div class="sl-metric-lbl">${t('wkLbl')}</div><div class="sl-metric-val" id="wv">${fmt(r0.wl)}</div></div>
      </div>
      <div class="sl-row">
        <div class="sl-top"><span class="sl-label">${t('dpLbl')}</span><span class="sl-val" id="dv">${fmt(dpDef)}</span></div>
        <input type="range" id="dp" min="5000" max="${truck.price}" step="500" value="${dpDef}">
        <div class="sl-range"><span>$5,000</span><span>${fmt(truck.price)}</span></div>
      </div>
      <div class="sl-row">
        <div class="sl-top"><span class="sl-label">${t('grossLbl')}</span><span class="sl-val" id="gv">${fmt(DG)}</span></div>
        <input type="range" id="gr" min="9000" max="15000" step="100" value="${DG}">
        <div class="sl-range"><span>$9,000</span><span>$15,000</span></div>
      </div>
      <div class="sl-row">
        <div class="sl-top"><span class="sl-label">${t('diesel')}</span><span class="sl-val" id="diev">${fmt(DDi)}</span></div>
        <input type="range" id="di" min="1000" max="3000" step="50" value="${DDi}">
        <div class="sl-range"><span>$1,000</span><span>$3,000</span></div>
      </div>
      <div class="sl-row">
        <div class="sl-top"><span class="sl-label">${t('tolls')}</span><span class="sl-val" id="tv">${fmt(DT)}</span></div>
        <input type="range" id="to" min="0" max="1000" step="25" value="${DT}">
        <div class="sl-range"><span>$0</span><span>$1,000</span></div>
      </div>
      <div class="divline"></div>
      <div class="bk-title">${t('bkTitle')}</div>
      <div class="bk-row"><span class="bk-l">${t('gross')}</span><span class="bk-v bk-pos" id="rg">${fmt(DG)}</span></div>
      <div class="bk-row"><span class="bk-l">${t('fee')}</span><span class="bk-v bk-neg" id="rf">−${fmt(r0.f10)}</span></div>
      <div class="bk-row"><span class="bk-l">${t('admin')}</span><span class="bk-v bk-neg">−$600</span></div>
      <div class="bk-row"><span class="bk-l">${t('diesel')}</span><span class="bk-v bk-neg" id="rdi">−${fmt(DDi)}</span></div>
      <div class="bk-row"><span class="bk-l">${t('tolls')}</span><span class="bk-v bk-neg" id="rto">−${fmt(DT)}</span></div>
      <div class="bk-row"><span class="bk-l">${t('trkPmt')}</span><span class="bk-v bk-neg" id="rl">−${fmt(r0.wl)}</span></div>
      <div class="calc-note">${t('wkLbl')}: based on $10k down</div>
    </div>`;

  function upd(){
    const dp=+document.getElementById('dp').value,gr=+document.getElementById('gr').value,
      di=+document.getElementById('di').value,to=+document.getElementById('to').value,r=c(dp,gr,di,to);
    document.getElementById('dv').textContent=fmt(dp);
    document.getElementById('gv').textContent=fmt(gr);
    document.getElementById('diev').textContent=fmt(di);
    document.getElementById('tv').textContent=fmt(to);
    document.getElementById('bv').textContent=fmt(r.rem);
    document.getElementById('wv').textContent=fmt(r.wl);
    document.getElementById('rg').textContent=fmt(gr);
    document.getElementById('rf').textContent='−'+fmt(r.f10);
    document.getElementById('rdi').textContent='−'+fmt(di);
    document.getElementById('rto').textContent='−'+fmt(to);
    document.getElementById('rl').textContent='−'+fmt(r.wl);
    document.getElementById('rlh').textContent=fmt(r.wl);
    const ne=document.getElementById('rn');ne.textContent=fmt(r.net);ne.style.color=r.net>=0?'var(--gr)':'var(--re)';
  }
  ['dp','gr','di','to'].forEach(id=>document.getElementById(id).addEventListener('input',upd));
}

// Swipe on preview
(function(){
  let sx=0;
  document.addEventListener('touchstart',e=>{const w=document.getElementById('previewImgWrap');if(w&&w.contains(e.target))sx=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{const w=document.getElementById('previewImgWrap');if(!w||!w.contains(e.target))return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)pNav(dx<0?1:-1);},{passive:true});
})();

// Boot
setLang('ru');
loadTrucks();
</script>
