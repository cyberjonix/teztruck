<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TezTruck</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#EEF2F7;--bg2:#FFFFFF;--bg3:#E4EAF2;
  --or:#E8620A;--or-dim:rgba(232,98,10,0.1);--or-bd:rgba(232,98,10,0.25);
  --bl:#1B4F8C;--bl2:#2563B0;--bl-dim:rgba(27,79,140,0.08);
  --tx:#0F1E30;--tx2:#4A6280;--tx3:#8EA5C0;
  --brd:#D0DCE8;--brd2:#B8CCE0;
  --gr:#0D7A3E;--gr-dim:rgba(13,122,62,0.08);--gr-bd:rgba(13,122,62,0.2);
  --re:#C0281A;--re-dim:rgba(192,40,26,0.08);
  --nav-h:68px;
  --r:14px;
  font-size:16px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* TOPBAR */
.topbar{height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bl);box-shadow:0 2px 10px rgba(27,79,140,0.35);}
.logo{font-size:1.5rem;font-weight:800;color:#fff;letter-spacing:.01em;}
.logo em{color:var(--or);font-style:normal;}
.lang-row{display:flex;gap:3px;background:rgba(255,255,255,0.13);border-radius:10px;padding:4px;}
.lb{font-size:.7rem;font-weight:700;padding:5px 10px;border-radius:7px;border:none;cursor:pointer;background:transparent;color:rgba(255,255,255,0.65);transition:all .15s;line-height:1;}
.lb.on{background:var(--or);color:#fff;}

/* SCREENS */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .22s,transform .22s;}
.screen.active{opacity:1;pointer-events:auto;transform:none;}

/* BOTTOM NAV */
.bottomnav{height:var(--nav-h);flex-shrink:0;display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--bg2);border-top:1px solid var(--brd);padding-bottom:env(safe-area-inset-bottom);}
.navbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;cursor:pointer;color:var(--tx3);transition:color .15s;position:relative;}
.navbtn.on{color:var(--bl);}
.navbtn.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:var(--bl);border-radius:0 0 3px 3px;}
.ni{font-size:1.4rem;}
.nl{font-size:.7rem;font-weight:700;letter-spacing:.02em;}

/* HERO */
.path-hero{padding:28px 20px 24px;background:linear-gradient(160deg,var(--bl) 0%,var(--bl2) 100%);position:relative;overflow:hidden;}
.path-hero::after{content:'';position:absolute;right:20px;bottom:-20px;width:120px;height:120px;border-radius:50%;background:rgba(232,98,10,0.15);}
.hero-tag{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:10px;}
.path-hero h1{font-size:2.1rem;font-weight:800;line-height:1.1;color:#fff;margin-bottom:10px;}
.path-hero h1 em{color:var(--or);font-style:normal;}
.path-hero p{font-size:.95rem;color:rgba(255,255,255,0.8);line-height:1.65;}

/* STAGES */
.stages-list{padding:16px;}
.stage-item{background:var(--bg2);border:1.5px solid var(--brd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;box-shadow:0 1px 4px rgba(27,79,140,0.07);}
.stage-item.open{border-color:var(--bl);box-shadow:0 4px 16px rgba(27,79,140,0.12);}
.stage-trigger{display:flex;align-items:center;gap:13px;padding:17px 16px;cursor:pointer;}
.stage-trigger:active{background:var(--bg3);}
.stnum{display:none;}
.stem{font-size:1.4rem;flex-shrink:0;}
.stinfo{flex:1;min-width:0;}
.stname{font-size:1rem;font-weight:700;color:var(--tx);line-height:1.25;}
.stdesc{font-size:.82rem;color:var(--tx3);margin-top:3px;line-height:1.4;}
.stbadge{font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:100px;flex-shrink:0;}
.b-start{background:rgba(13,122,62,0.1);color:var(--gr);}
.b-grow{background:rgba(27,79,140,0.1);color:var(--bl);}
.b-biz{background:var(--or-dim);color:var(--or);}
.b-scale{background:rgba(139,92,246,0.1);color:#7C3AED;}
.b-driver{background:rgba(16,185,129,0.1);color:#059669;}
.stchev{color:var(--tx3);font-size:.8rem;flex-shrink:0;transition:transform .25s;margin-left:4px;}
.stage-item.open .stchev{transform:rotate(180deg);color:var(--bl);}
.stage-body{max-height:0;overflow:hidden;transition:max-height .45s ease;}
.stage-item.open .stage-body{max-height:2600px;}
.stage-body-inner{padding:4px 16px 18px;border-top:1px solid var(--brd);}
.svcs{display:flex;flex-direction:column;gap:8px;margin-top:13px;}
.svc-row{display:flex;align-items:flex-start;gap:12px;padding:12px 13px;background:var(--bg3);border-radius:10px;}
.svc-em{font-size:1.15rem;flex-shrink:0;margin-top:1px;}
.svc-n{font-size:.9rem;font-weight:700;color:var(--tx);line-height:1.3;}
.svc-d{font-size:.8rem;color:var(--tx2);margin-top:3px;line-height:1.5;}
.stage-cta-btn{display:block;width:100%;margin-top:14px;background:var(--bl);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;padding:15px;border-radius:11px;border:none;cursor:pointer;transition:opacity .15s;letter-spacing:.01em;}
.stage-cta-btn:active{opacity:.82;}
.stage-cta-btn.orange{background:var(--or);}
.stage-item.violations{border-color:var(--brd);}
.stage-item.violations.open{border-color:var(--bl);}

/* FORMS */
.form-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--brd);}
.form-title{font-size:.8rem;font-weight:800;color:var(--bl);margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em;}
.frow{margin-bottom:13px;}
.flabel{font-size:.85rem;font-weight:600;color:var(--tx2);margin-bottom:6px;display:block;line-height:1.3;}
.flabel .opt{font-weight:400;color:var(--tx3);font-size:.78rem;}
.finput{width:100%;padding:13px 14px;border:1.5px solid var(--brd);border-radius:10px;font-size:.95rem;font-family:'Plus Jakarta Sans',sans-serif;color:var(--tx);background:var(--bg2);outline:none;transition:border-color .15s;}
.finput:focus{border-color:var(--bl);}
.finput.err{border-color:var(--re);}
.fupload{position:relative;}
.fupload-zone{border:1.5px dashed var(--brd2);border-radius:10px;padding:18px 14px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;background:var(--bg3);}
.fupload-zone:active{background:var(--bl-dim);}
.fupload-zone.has-file{border-color:var(--gr);background:var(--gr-dim);}
.fupload-zone.uploading{border-color:var(--bl);background:var(--bl-dim);}
.fupload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.fupload-icon{font-size:1.5rem;margin-bottom:5px;}
.fupload-text{font-size:.88rem;font-weight:600;color:var(--tx2);}
.fupload-sub{font-size:.75rem;color:var(--tx3);margin-top:3px;}
.fupload-name{font-size:.8rem;color:var(--gr);font-weight:600;margin-top:5px;word-break:break-all;}
.fprogress{height:3px;background:var(--brd);border-radius:3px;margin-top:8px;overflow:hidden;display:none;}
.fprogress-bar{height:100%;background:var(--bl);border-radius:3px;width:0;transition:width .3s;}
.fupload-zone.uploading .fprogress{display:block;}
.fsubmit{display:block;width:100%;padding:15px;background:var(--gr);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.98rem;font-weight:700;border-radius:11px;border:none;cursor:pointer;margin-top:14px;transition:opacity .15s;letter-spacing:.01em;}
.fsubmit:active{opacity:.82;}
.fsubmit:disabled{opacity:.45;cursor:default;}
.fsubmit.paying{background:var(--or);}
.form-success{display:none;text-align:center;padding:24px 10px;}
.form-success.vis{display:block;}
.fs-icon{font-size:2.8rem;margin-bottom:10px;}
.fs-title{font-size:1.1rem;font-weight:800;color:var(--gr);margin-bottom:8px;}
.fs-sub{font-size:.88rem;color:var(--tx2);line-height:1.6;}
.stripe-wrap{border:1.5px solid var(--brd);border-radius:10px;padding:14px;background:var(--bg2);margin-top:4px;}
.stripe-note{font-size:.75rem;color:var(--tx3);text-align:center;margin-top:7px;display:flex;align-items:center;justify-content:center;gap:4px;}

/* TRUCKS */
.truck-panel{padding:18px 16px 0;}
.tp-title{font-size:1.1rem;font-weight:800;color:var(--tx);}
.tp-sub{font-size:.82rem;color:var(--tx3);margin-top:3px;}
.trucks-scroll{display:flex;gap:12px;overflow-x:auto;padding:14px 0;scrollbar-width:none;}
.trucks-scroll::-webkit-scrollbar{display:none;}
.tcard{width:168px;flex-shrink:0;border-radius:12px;border:1.5px solid var(--brd);background:var(--bg2);overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(27,79,140,0.06);transition:border-color .15s,box-shadow .15s;-webkit-user-select:none;}
.tcard:active{box-shadow:none;}
.tcard.sel{border-color:var(--or);box-shadow:0 0 0 3px var(--or-dim);}
.tcard.sold{opacity:.5;cursor:default;}
.tcard-img{width:100%;aspect-ratio:4/3;background:var(--bg3);overflow:hidden;position:relative;}
.tcard-img img{width:100%;height:100%;object-fit:cover;display:block;}
.tcard-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--brd2);}
.tcard-stag{position:absolute;top:6px;left:6px;font-size:.7rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:5px;}
.st-available{background:rgba(13,122,62,0.15);color:var(--gr);}
.st-pending{background:var(--or-dim);color:var(--or);}
.st-sold{background:rgba(0,0,0,.07);color:var(--tx3);}
.tcard-sel-ring{position:absolute;inset:0;border:2px solid var(--or);pointer-events:none;}
.tcard-check{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:var(--or);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.tcard-body{padding:11px 12px 13px;}
.tcard-name{font-size:.82rem;font-weight:700;color:var(--tx);line-height:1.25;margin-bottom:3px;}
.tcard-det{font-size:.7rem;color:var(--tx3);margin-bottom:7px;line-height:1.35;}
.tcard-wk{font-size:1.15rem;font-weight:800;color:var(--or);line-height:1;}
.tcard-wk span{font-size:.75rem;color:var(--tx3);font-weight:500;}
.tcard-price{font-size:.7rem;color:var(--tx3);margin-top:2px;}
.panel-div{height:1px;background:var(--brd);margin:0 16px;}
.truck-preview-wrap{display:none;margin:0 16px 14px;border-radius:12px;overflow:hidden;border:1px solid var(--brd);}
.truck-preview-wrap.vis{display:block;}
.prev-img-wrap{width:100%;aspect-ratio:16/7;background:var(--bg3);overflow:hidden;position:relative;}
.prev-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.prev-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--brd2);}
.pnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.88);border:1px solid var(--brd);color:var(--tx);width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.pnav.prev{left:8px;}.pnav.next{right:8px;}
.pdots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.pdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;}
.pdot.on{background:var(--or);}
.calc-empty{padding:40px 24px;text-align:center;}
.calc-empty-icon{font-size:2.4rem;margin-bottom:10px;opacity:.25;}
.calc-empty-text{font-size:.9rem;color:var(--tx3);line-height:1.6;}
.calc-empty-arrow{font-size:1.1rem;color:var(--tx3);margin-top:10px;opacity:.25;animation:bob 1.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.truck-chip{padding:13px 16px;border-bottom:1px solid var(--or-bd);background:linear-gradient(135deg,#FFF5EE,var(--bg2));}
.tc-name{font-size:.92rem;font-weight:700;color:var(--tx);}
.tc-det{font-size:.75rem;color:var(--tx3);margin-top:2px;}
.net-hero{padding:16px;background:var(--gr-dim);border-bottom:1px solid var(--gr-bd);display:flex;justify-content:space-between;align-items:flex-start;}
.nh-l .nh-lbl{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gr);margin-bottom:3px;}
.nh-l .nh-val{font-size:2.4rem;font-weight:800;color:var(--gr);line-height:1;}
.nh-r{text-align:right;}
.nh-r .nh-lbl{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);margin-bottom:3px;}
.nh-r .nh-val{font-size:1.3rem;font-weight:800;color:var(--or);line-height:1;}
.nh-r .nh-sub{font-size:.72rem;color:var(--tx3);margin-top:2px;}
.sliders-block{padding:16px;}
.sl-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.sl-metric{background:var(--bg3);border-radius:10px;padding:10px 12px;}
.sl-metric-lbl{font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);margin-bottom:3px;}
.sl-metric-val{font-size:1.05rem;font-weight:800;color:var(--tx);}
.sl-row{margin-bottom:16px;}
.sl-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.sl-label{font-size:.85rem;font-weight:600;color:var(--tx2);}
.sl-val{font-size:1.05rem;font-weight:800;color:var(--or);}
input[type=range]{width:100%;height:4px;appearance:none;-webkit-appearance:none;background:var(--brd2);border-radius:4px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--or);border:3px solid var(--bg2);box-shadow:0 1px 6px rgba(232,98,10,.35);}
.sl-range{display:flex;justify-content:space-between;font-size:.72rem;color:var(--tx3);margin-top:4px;}
.divline{border:none;border-top:1px solid var(--brd);margin:14px 0;}
.bk-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:10px;}
.bk-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.88rem;}
.bk-l{color:var(--tx2);}
.bk-v{font-weight:700;}
.bk-pos{color:var(--gr);}
.bk-neg{color:var(--re);}
.calc-note{font-size:.72rem;color:var(--tx3);text-align:center;margin-top:6px;padding-bottom:10px;}
.skel{width:168px;flex-shrink:0;border-radius:12px;border:1px solid var(--brd);background:var(--bg2);overflow:hidden;}
.skel-img{width:100%;aspect-ratio:4/3;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-body{padding:11px 12px 13px;display:flex;flex-direction:column;gap:7px;}
.skel-line{height:10px;border-radius:5px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.skel-line.w60{width:60%;}.skel-line.w40{width:40%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* CONTACT */
.contact-hero{padding:32px 20px 26px;background:linear-gradient(160deg,var(--bl),var(--bl2));text-align:center;}
.contact-hero h2{font-size:2rem;font-weight:800;color:#fff;margin-bottom:8px;line-height:1.1;}
.contact-hero h2 em{color:var(--or);font-style:normal;}
.contact-hero p{font-size:.92rem;color:rgba(255,255,255,0.82);line-height:1.6;}
.contact-list{padding:20px 16px;display:flex;flex-direction:column;gap:12px;}
.contact-btn{display:flex;align-items:center;gap:15px;padding:17px 18px;border-radius:var(--r);text-decoration:none;border:none;cursor:pointer;transition:opacity .15s,transform .1s;}
.contact-btn:active{opacity:.85;transform:scale(.98);}
.contact-btn.phone{background:var(--or);color:#fff;}
.contact-btn.tg{background:#229ED9;color:#fff;}
.contact-btn.wa{background:#25D366;color:#fff;}
.cb-icon{font-size:1.5rem;}
.cb-label{font-size:1.05rem;font-weight:700;}
.cb-sub{font-size:.78rem;opacity:.82;margin-top:2px;}
.contact-info{padding:0 16px 28px;display:flex;flex-direction:column;gap:10px;}
.info-row{display:flex;align-items:center;gap:12px;padding:13px 15px;background:var(--bg2);border:1px solid var(--brd);border-radius:11px;}
.info-icon{font-size:1.05rem;}
.info-text{font-size:.85rem;color:var(--tx2);}
.info-text strong{color:var(--tx);font-weight:600;}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--tx);color:#fff;font-size:.85rem;font-weight:600;padding:11px 20px;border-radius:22px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--gr);}
.toast.err{background:var(--re);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Tez<em>Truck</em></div>
    <div class="lang-row">
      <button class="lb on" id="lb-ru" onclick="setLang('ru')">🇷🇺 РУ</button>
      <button class="lb" id="lb-en" onclick="setLang('en')">🇺🇸 EN</button>
      <button class="lb" id="lb-tg" onclick="setLang('tg')">🇹🇯 ТЧ</button>
      <button class="lb" id="lb-uz" onclick="setLang('uz')">🇺🇿 ЎЗ</button>
    </div>
  </div>

  <div class="screens">

    <!-- ① PATH -->
    <div class="screen active" id="sc-path">
      <div class="path-hero">
        <div class="hero-tag" data-i="heroEyebrow"></div>
        <h1 data-ih="heroTitle"></h1>
        <p data-i="heroSub"></p>
      </div>
      <div class="stages-list">

        <!-- 01 CDL -->
        <div class="stage-item" id="st1">
          <div class="stage-trigger" onclick="toggleStage('st1')">
            <div class="stnum" style="display:none"></div><div class="stem">🎓</div>
            <div class="stinfo"><div class="stname" data-i="s1name"></div><div class="stdesc" data-i="s1desc"></div></div>
            <div class="stbadge b-start" data-i="tagStart"></div><div class="stchev">▼</div>
          </div>
          <div class="stage-body"><div class="stage-body-inner">
            <div class="svcs">
              <div class="svc-row"><div class="svc-em">📋</div><div><div class="svc-n" data-i="s1svc1n"></div><div class="svc-d" data-i="s1svc1d"></div></div></div>
              <div class="svc-row"><div class="svc-em">🏢</div><div><div class="svc-n" data-i="s1svc2n"></div><div class="svc-d" data-i="s1svc2d"></div></div></div>
              
            </div>
            <!-- FORM 1: CDL Application -->
            <div class="form-section" id="form1-wrap">
              <div class="form-title" data-i="form1title"></div>
              <div id="form1-body">
                <div class="frow">
                  <label class="flabel" data-i="fPermit"></label>
                  <div class="fupload" id="up-permit">
                    <div class="fupload-zone" id="uz-permit">
                      <div class="fupload-icon">📄</div>
                      <div class="fupload-text" data-i="fUploadBtn"></div>
                      <div class="fupload-sub">PDF, JPG, PNG</div>
                      <div class="fupload-name" id="un-permit"></div>
                      <div class="fprogress"><div class="fprogress-bar" id="pb-permit"></div></div>
                    </div>
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(this,'permit','uz-permit','un-permit','pb-permit')">
                  </div>
                </div>
                <div class="frow">
                  <label class="flabel" data-i="fMedical"></label>
                  <div class="fupload" id="up-medical">
                    <div class="fupload-zone" id="uz-medical">
                      <div class="fupload-icon">🏥</div>

// ── SUPABASE ──────────────────────────────────────────
async function sbReq(path,opts={}){
  const r=await fetch(SB_URL+path,{...opts,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const ct=r.headers.get('content-type')||'';
  return ct.includes('json')?r.json():r.text();
}

const uploadedFiles={};
async function handleFile(input,key,zoneId,nameId,pbId){
  const file=input.files[0];if(!file)return;
  const zone=document.getElementById(zoneId);
  const nameEl=document.getElementById(nameId);
  const pb=document.getElementById(pbId);
  zone.className='fupload-zone uploading';
  nameEl.textContent=file.name;
  pb.style.width='30%';
  try{
    const ext=file.name.split('.').pop();
    const path=`forms/${key}_${Date.now()}.${ext}`;
    const ab=await file.arrayBuffer();
    const r=await fetch(`${SB_URL}/storage/v1/object/documents/${path}`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},
      body:ab
    });
    pb.style.width='100%';
    if(!r.ok)throw new Error(await r.text());
    uploadedFiles[key]=`${SB_URL}/storage/v1/object/public/documents/${path}`;
    zone.className='fupload-zone has-file';
    nameEl.textContent='✓ '+file.name;
  }catch(e){
    zone.className='fupload-zone';
    nameEl.textContent='';
    showToast('Upload error: '+e.message,'err');
  }
}

let trucks=[],selId=null,pidx=0;
async function loadTrucks(){
  try{
    const r=await sbReq(`/rest/v1/trucks?order=sort_order.asc,created_at.asc`);
    trucks=r||[];renderTrucks();
  }catch(e){loadDemo();}
}
function loadDemo(){
  trucks=[
    {id:'d1',name:'2020 Kenworth T680',detail:'500HP Paccar MX-13 · 12-Spd Auto',price:85000,status:'available',photos:[]},
    {id:'d2',name:'2019 Peterbilt 579',detail:'455HP Paccar MX-13 · 10-Spd Auto',price:72000,status:'available',photos:[]},
    {id:'d3',name:'2021 Freightliner Cascadia',detail:'500HP Detroit DD15 · 12-Spd Auto',price:95000,status:'available',photos:[]},
    {id:'d4',name:'2018 Volvo VNL 860',detail:'475HP D13 · Automated Manual',price:64000,status:'pending',photos:[]}
  ];renderTrucks();
}
function fmt(n){return'$'+Math.round(n).toLocaleString();}
function stLbl(s){return t({available:'sAvail',pending:'sPend',sold:'sSold'}[s]||s);}

function renderTrucks(){
  const sc=document.getElementById('trucksScroll');sc.innerHTML='';
  trucks.forEach(truck=>{
    const isSel=selId===truck.id,wk=(truck.price-10000)/52;
    const ph=(truck.photos||[])[0];
    const phHTML=ph?`<img src="${ph}" alt="${truck.name}" onerror="this.parentNode.innerHTML='<div class=tcard-ph>🚛</div>'">`:'<div class="tcard-ph">🚛</div>';
    const card=document.createElement('div');
    card.className='tcard'+(truck.status==='sold'?' sold':'')+(isSel?' sel':'');
    card.onclick=()=>pick(truck.id);
    card.innerHTML=`<div class="tcard-img">${phHTML}<div class="tcard-stag st-${truck.status}">${stLbl(truck.status)}</div>${isSel?'<div class="tcard-sel-ring"></div><div class="tcard-check">✓</div>':''}</div><div class="tcard-body"><div class="tcard-name">${truck.name}</div><div class="tcard-det">${truck.detail}</div><div class="tcard-wk">${fmt(wk)}<span>${t('colWk')}</span></div><div class="tcard-price">${fmt(truck.price)}</div></div>`;
    sc.appendChild(card);
  });
}
function pick(id){
  const truck=trucks.find(x=>x.id===id);
  if(!truck||truck.status==='sold')return;
  selId=truck.id;pidx=0;renderTrucks();renderPreview(truck);renderCalc(truck);
}
function renderPreview(truck){
  const photos=truck.photos||[],w=document.getElementById('previewImgWrap'),wrap=document.getElementById('previewWrap');
  const idx=Math.min(pidx,Math.max(0,photos.length-1));
  if(photos.length){
    const nav=photos.length>1?`<button class="pnav prev" onclick="pNav(-1)">❮</button><button class="pnav next" onclick="pNav(1)">❯</button><div class="pdots">${photos.map((_,i)=>`<div class="pdot${i===idx?' on':''}" onclick="pGo(${i})"></div>`).join('')}</div>`:'';
    w.innerHTML=`<img src="${photos[idx]}" alt="${truck.name}">${nav}`;
  }else{w.innerHTML='<div class="prev-ph">🚛</div>';}
  wrap.classList.add('vis');
}
function pNav(d){const tr=trucks.find(x=>x.id===selId);if(!tr||!tr.photos.length)return;pidx=(pidx+d+tr.photos.length)%tr.photos.length;renderPreview(tr);}
function pGo(i){pidx=i;const tr=trucks.find(x=>x.id===selId);if(tr)renderPreview(tr);}
function showCalcEmpty(){document.getElementById('calcArea').innerHTML=`<div class="calc-empty"><div class="calc-empty-icon">☝️</div><div class="calc-empty-text">${t('calcHint')}</div><div class="calc-empty-arrow">↑</div></div>`;}

      <div class="sl-row"><div class="sl-top"><span class="sl-label">${t('diesel')}</span><span class="sl-val" id="diev">${fmt(DDi)}</span></div><input type="range" id="di" min="1000" max="3000" step="50" value="${DDi}"><div class="sl-range"><span>$1,000</span><span>$3,000</span></div></div>
      <div class="sl-row"><div class="sl-top"><span class="sl-label">${t('tolls')}</span><span class="sl-val" id="tv">${fmt(DT)}</span></div><input type="range" id="to" min="0" max="1000" step="25" value="${DT}"><div class="sl-range"><span>$0</span><span>$1,000</span></div></div>

      <div class="bk-row"><span class="bk-l">${t('admin')}</span><span class="bk-v bk-neg">−$600</span></div>
      <div class="bk-row"><span class="bk-l">${t('diesel')}</span><span class="bk-v bk-neg" id="rdi">−${fmt(DDi)}</span></div>
      <div class="bk-row"><span class="bk-l">${t('tolls')}</span><span class="bk-v bk-neg" id="rto">−${fmt(DT)}</span></div>
      <div class="bk-row"><span class="bk-l">${t('trkPmt')}</span><span class="bk-v bk-neg" id="rl">−${fmt(r0.wl)}</span></div>
      <div class="calc-note">Based on $10k down payment</div>
    </div>`;
  function upd(){
    const dp=+document.getElementById('dp').value,gr=+document.getElementById('gr').value,di=+document.getElementById('di').value,to=+document.getElementById('to').value,r=c(dp,gr,di,to);
    document.getElementById('dv').textContent=fmt(dp);document.getElementById('gv').textContent=fmt(gr);document.getElementById('diev').textContent=fmt(di);document.getElementById('tv').textContent=fmt(to);
    document.getElementById('bv').textContent=fmt(r.rem);document.getElementById('wv').textContent=fmt(r.wl);
    document.getElementById('rg').textContent=fmt(gr);document.getElementById('rf').textContent='−'+fmt(r.f10);document.getElementById('rdi').textContent='−'+fmt(di);document.getElementById('rto').textContent='−'+fmt(to);document.getElementById('rl').textContent='−'+fmt(r.wl);document.getElementById('rlh').textContent=fmt(r.wl);
    const ne=document.getElementById('rn');ne.textContent=fmt(r.net);ne.style.color=r.net>=0?'var(--gr)':'var(--re)';

(function(){let sx=0;
  document.addEventListener('touchstart',e=>{const w=document.getElementById('previewImgWrap');if(w&&w.contains(e.target))sx=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{const w=document.getElementById('previewImgWrap');if(!w||!w.contains(e.target))return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)pNav(dx<0?1:-1);},{passive:true});
})();

setLang('ru');
loadTrucks();

setTimeout(initStripe, 100);
