<style>
:root{--or:#E8500A;--or-lt:#FFF3EE;--or-bd:#FFD5BC;--bg:#FAFAFA;--sur:#FFFFFF;--brd:#EBEBEB;--brd2:#F4F4F4;--tx:#111;--mu:#777;--su:#BBB;--gr:#1B8A4A;--gr-bg:#F0FAF4;--gr-bd:#B2E0C4;--re:#C83030;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;}
header{height:64px;padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;background:var(--sur);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;cursor:pointer;user-select:none;}
.logo img{height:38px;width:auto;display:block;}
.logo em{color:var(--or);font-style:normal;}
.lang-pill{display:flex;background:var(--brd2);border:1px solid var(--brd);border-radius:24px;padding:3px;gap:2px;}
.lbtn{background:transparent;border:none;color:var(--mu);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;padding:7px 13px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;letter-spacing:.02em;}
.lbtn .fl{font-size:1rem;}
.lbtn.active{background:var(--or);color:#fff;box-shadow:0 2px 8px rgba(232,80,10,.3);}
.lbtn:not(.active):hover{background:rgba(0,0,0,.05);color:var(--tx);}
.hero{padding:1.5rem 1rem 1.25rem;background:var(--sur);border-bottom:1px solid var(--brd);}
.badge{display:inline-flex;align-items:center;gap:5px;background:var(--or-lt);border:1px solid var(--or-bd);color:var(--or);font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;line-height:1.05;margin-bottom:6px;}
.hero h1 em{color:var(--or);font-style:normal;}
.hero p{font-size:.875rem;color:var(--mu);line-height:1.55;}
.sec{padding:1rem 0 0;}
.sec-label{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--su);padding:0 1rem;margin-bottom:.75rem;}
.trucks-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 1rem 1rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.trucks-scroll::-webkit-scrollbar{display:none;}
.skel{flex:0 0 200px;background:var(--sur);border:1.5px solid var(--brd);border-radius:14px;overflow:hidden;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.skel-photo{width:100%;aspect-ratio:4/3;background:#EEEEEB;}
.skel-body{padding:10px 12px 12px;}
.skel-line{height:11px;border-radius:4px;background:#EEEEEB;margin-bottom:7px;}
.skel-line.w70{width:70%}.skel-line.w40{width:40%}
.tcard{flex:0 0 200px;scroll-snap-align:start;background:var(--sur);border:1.5px solid var(--brd);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s;position:relative;}
.tcard:active{transform:scale(.97);}
.tcard.sel{border-color:var(--or);box-shadow:0 0 0 2px rgba(232,80,10,.12);}
.tcard.sold{opacity:.35;pointer-events:none;}
.tcard-photo{width:100%;aspect-ratio:4/3;background:#F0F0EE;overflow:hidden;position:relative;}
.tcard-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.tcard-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:#DDD;}
.tcard-sel-ring{position:absolute;inset:0;border:3px solid var(--or);border-radius:12px;pointer-events:none;}
.tcard-check{position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;background:var(--or);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.tcard-st{position:absolute;top:7px;left:7px;}
.stag{font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;}
.st-available{background:#E8F7EF;color:var(--gr);}
.st-pending{background:var(--or-lt);color:var(--or);}
.st-sold{background:#F0F0F0;color:var(--su);}
.tcard-body{padding:10px 12px 12px;}
.tcard-name{font-size:.8rem;font-weight:700;line-height:1.25;margin-bottom:2px;}
.tcard-det{font-size:.65rem;color:var(--su);margin-bottom:8px;line-height:1.3;}
.tcard-price{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:800;color:var(--tx);}
.tcard-wk{font-size:.65rem;font-weight:600;color:var(--or);margin-top:1px;}
.scroll-note{font-size:.62rem;color:var(--su);padding:0 1rem;margin-top:-4px;margin-bottom:8px;}
.err-banner{margin:0 1rem 1rem;background:#FFF0F0;border:1px solid #FFCCCC;border-radius:10px;padding:12px 14px;font-size:.82rem;color:var(--re);display:none;line-height:1.5;}
.err-banner.vis{display:block;}
.preview-wrap{margin:0 1rem;display:none;border-radius:14px;overflow:hidden;border:1px solid var(--brd);}
.preview-wrap.vis{display:block;}
.preview-img-wrap{position:relative;width:100%;aspect-ratio:16/8;background:#F0F0EE;overflow:hidden;}
.preview-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.preview-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:4rem;color:#DDD;}
.pnav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:1px solid var(--brd);color:var(--tx);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.pnav:active{background:var(--or);color:#fff;border-color:var(--or);}
.pnav.prev{left:9px;}.pnav.next{right:9px;}
.pcnt{position:absolute;top:8px;right:10px;background:rgba(0,0,0,.4);color:#fff;font-size:.65rem;font-weight:600;padding:2px 7px;border-radius:10px;}
.pdots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.pdot{width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,.18);cursor:pointer;}
.pdot.on{background:var(--or);}
.preview-bar{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--sur);border-top:1px solid var(--brd2);}
.preview-bar-name{font-size:.88rem;font-weight:700;}
.preview-bar-det{font-size:.68rem;color:var(--su);margin-top:1px;}
.preview-bar-price{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:var(--or);flex-shrink:0;}
.calc-wrap{margin:0 1rem;background:var(--sur);border:1px solid var(--brd);border-radius:14px;overflow:hidden;margin-bottom:1rem;}
.calc-ph{text-align:center;padding:2.5rem 1.5rem;color:var(--su);}
.calc-ph-icon{font-size:2.2rem;margin-bottom:8px;}
.calc-ph p{font-size:.875rem;line-height:1.5;}
.calc-ph-arrow{font-size:1.2rem;margin-top:8px;display:block;animation:bob 1.2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
.net-hero{padding:16px 14px 14px;background:var(--gr-bg);border-bottom:1.5px solid var(--gr-bd);display:flex;align-items:center;justify-content:space-between;}
.net-hero-left .lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gr);margin-bottom:3px;}
.net-hero-left .val{font-family:'Barlow Condensed',sans-serif;font-size:2.6rem;font-weight:800;color:var(--gr);line-height:1;}
.net-hero-right{text-align:right;}
.net-hero-right .lbl{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--su);margin-bottom:3px;}
.net-hero-right .val{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;color:var(--or);line-height:1;}
.calc-chip{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--brd2);background:var(--or-lt);}
.calc-chip-name{font-size:.82rem;font-weight:700;}
.calc-chip-price{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;color:var(--or);}
.calc-body{padding:14px;}
.cs{margin-bottom:16px;}
.cl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.cl-text{font-size:.78rem;font-weight:600;color:var(--mu);}
.cl-val{font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:800;color:var(--tx);}
input[type=range]{width:100%;height:5px;appearance:none;background:var(--brd);border-radius:3px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:26px;height:26px;border-radius:50%;background:var(--or);border:3px solid #fff;box-shadow:0 2px 6px rgba(232,80,10,.3);}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--or);border:3px solid #fff;}
.ch{display:flex;justify-content:space-between;font-size:.62rem;color:var(--su);margin-top:4px;}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.metric{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:9px 11px;}
.metric-lbl{font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--su);margin-bottom:3px;}
.metric-val{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;color:var(--tx);}
.hdivider{border:none;border-top:1px solid var(--brd2);margin:14px 0;}
.bk-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.83rem;}
.bk-row .l{color:var(--mu);}
.bk-row .v{font-weight:700;}
.bk-row .v.pos{color:var(--gr);}
.bk-row .v.neg{color:var(--re);}
.cta{background:var(--or-lt);border-top:1px solid var(--or-bd);border-bottom:1px solid var(--or-bd);padding:1.75rem 1rem;}
.cta-tag{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--or);margin-bottom:5px;}
.cta-h{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;line-height:1;margin-bottom:5px;}
.cta-p{font-size:.84rem;color:var(--mu);line-height:1.5;margin-bottom:1.1rem;}
.cta-btns{display:flex;gap:9px;}
.cbtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 18px;border-radius:10px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;text-decoration:none;flex:1;}
.cbtn-ph{background:var(--or);color:#fff;}
.cbtn-tg{background:#229ED9;color:#fff;}
footer{border-top:1px solid var(--brd);padding:1.1rem;text-align:center;color:var(--su);font-size:.75rem;background:var(--sur);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--sur);border:1px solid var(--brd);border-radius:16px;padding:1.25rem;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.15);}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;padding-bottom:.875rem;border-bottom:1px solid var(--brd);}
.mhdr-title{font-size:.95rem;font-weight:700;}
.xbtn{background:none;border:1px solid var(--brd);color:var(--su);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.setup-step{background:var(--bg);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px;}
.setup-step h3{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--or);margin-bottom:8px;}
.setup-step p{font-size:.82rem;color:var(--mu);line-height:1.6;margin-bottom:6px;}
.setup-step a{color:var(--or);}
.setup-step code{background:#F0F0EE;padding:2px 6px;border-radius:4px;font-size:.78rem;font-family:monospace;color:var(--tx);}
.setup-step pre{background:#111;color:#7fff7f;font-family:monospace;font-size:.7rem;padding:10px;border-radius:6px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin:8px 0;line-height:1.5;}
.copy-snippet{background:var(--or);border:none;color:#fff;font-size:.68rem;font-weight:700;padding:5px 12px;border-radius:4px;cursor:pointer;margin-top:4px;}
.setup-success{background:var(--gr-bg);border:1px solid var(--gr-bd);border-radius:8px;padding:12px;font-size:.8rem;color:var(--gr);line-height:1.6;margin-top:10px;}
.adm-pass{text-align:center;padding:1.5rem 0;}
.adm-pass p{color:var(--mu);margin-bottom:.875rem;font-size:.875rem;}
.pinput{background:var(--bg);border:1.5px solid var(--brd);border-radius:7px;color:var(--tx);font-family:'Inter',sans-serif;font-size:1rem;padding:10px 14px;width:100%;max-width:250px;margin-bottom:1rem;outline:none;}
.pinput:focus{border-color:var(--or);}
.btn-or{background:var(--or);border:none;color:#fff;font-family:'Inter',sans-serif;font-size:.875rem;font-weight:700;padding:10px 20px;border-radius:8px;cursor:pointer;}
.btn-or:disabled{opacity:.5;cursor:not-allowed;}
.btn-sec{background:transparent;border:1px solid var(--brd);color:var(--mu);font-family:'Inter',sans-serif;font-size:.8rem;padding:7px 13px;border-radius:6px;cursor:pointer;}
.btn-del{background:transparent;border:1px solid #FFCCCC;color:var(--re);font-family:'Inter',sans-serif;font-size:.75rem;padding:6px 11px;border-radius:6px;cursor:pointer;}
.adm-ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
.tal{display:flex;flex-direction:column;gap:6px;margin-bottom:1.1rem;max-height:220px;overflow-y:auto;}
.tai{background:var(--bg);border:1px solid var(--brd);border-radius:7px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.tai-name{font-weight:600;font-size:.83rem;}
.tai-price{color:var(--mu);font-size:.75rem;margin-top:1px;}
.tai-acts{display:flex;gap:5px;flex-shrink:0;}
.af{background:var(--bg);border:1px solid var(--brd);border-radius:9px;padding:1rem;margin-top:10px;}
.af h3{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--su);margin-bottom:.75rem;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff.full{grid-column:1/-1;}
.ff label{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--su);}
.ff input,.ff select{background:var(--sur);border:1.5px solid var(--brd);border-radius:6px;color:var(--tx);font-family:'Inter',sans-serif;font-size:.85rem;padding:8px 9px;outline:none;}
.ff input:focus,.ff select:focus{border-color:var(--or);}
.existing-photos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.exph-wrap{position:relative;}
.exph{width:62px;height:62px;object-fit:cover;border-radius:6px;border:1px solid var(--brd);display:block;}
.exph-del{position:absolute;top:-5px;right:-5px;background:var(--re);border:2px solid #fff;color:#fff;width:18px;height:18px;border-radius:50%;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-weight:700;}
.dz{border:2px dashed var(--brd);border-radius:8px;padding:16px;text-align:center;cursor:pointer;user-select:none;transition:all .15s;}
.dz:hover,.dz.dz-over{border-color:var(--or);background:var(--or-lt);}
.dz-icon{font-size:1.5rem;margin-bottom:4px;}
.dz-main{color:var(--mu);font-size:.8rem;}
.dz-sub{color:var(--su);font-size:.7rem;margin-top:2px;}
.uq{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.uqi{position:relative;width:62px;}
.uqi-img{width:62px;height:62px;object-fit:cover;border-radius:6px;border:1px solid var(--brd);display:block;}
.uqi-ov{position:absolute;inset:0;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.uqi-prog{background:rgba(0,0,0,.5);}
.uqi-bar{width:38px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden;}
.uqi-fill{height:100%;background:#fff;border-radius:2px;animation:progani 1.2s ease-in-out infinite;}
@keyframes progani{0%{width:20%}50%{width:80%}100%{width:20%}}
.uqi-done{background:rgba(27,138,74,.65);color:#fff;font-size:1.3rem;}
.uqi-err{background:rgba(200,48,48,.65);color:#fff;font-size:.68rem;text-align:center;padding:3px;}
.uqi-rm{position:absolute;top:-5px;right:-5px;background:#888;border:none;color:#fff;width:16px;height:16px;border-radius:50%;font-size:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.emsg{color:var(--re);font-size:.78rem;margin-top:5px;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(10px);background:#111;color:#fff;font-size:.82rem;font-weight:600;padding:10px 18px;border-radius:20px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:380px){.hero h1{font-size:1.9rem;}.fg{grid-template-columns:1fr;}}
</style>
</head>

// ── Supabase REST ────────────────────────────────────
async function sb(path, opts={}) {
  const r = await fetch(SB_URL + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!r.ok) throw new Error(await r.text());
  const ct = r.headers.get('content-type') || '';
  return ct.includes('json') ? r.json() : r.text();
}

const stgDel = paths    => sb(`/storage/v1/object/${BUCKET}`, {method:'DELETE', body:JSON.stringify({prefixes:paths})});

async function stgUp(file) {
  const ext  = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const path = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
  const r = await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'POST',
    headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type,'x-upsert':'true'},
    body: file
  });
  if (!r.ok) throw new Error(await r.text());
  return `${SB_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

// ── Load trucks ──────────────────────────────────────
async function loadTrucks(){
  if(!READY){ loadDemo(); return; }
  try { trucks = await dbGet() || []; renderTrucks(); }
  catch(e) { showErr(t('loadErr')); loadDemo(); }
}
function loadDemo(){
  trucks=[
    {id:'d1',name:'2020 Kenworth T680',detail:'500HP Paccar MX-13 • 12-Speed Auto',price:85000,status:'available',photos:[]},
    {id:'d2',name:'2019 Peterbilt 579',detail:'455HP Paccar MX-13 • 10-Speed Auto',price:72000,status:'available',photos:[]},
    {id:'d3',name:'2021 Freightliner Cascadia',detail:'500HP Detroit DD15 • 12-Speed Auto',price:95000,status:'available',photos:[]},
    {id:'d4',name:'2018 Volvo VNL 860',detail:'475HP D13 • Automated Manual',price:64000,status:'pending',photos:[]}
  ];
  renderTrucks();
}
function showErr(msg){ const b=document.getElementById('errBanner'); b.textContent='⚠️ '+msg; b.classList.add('vis'); }

// ── Render trucks ────────────────────────────────────
const DG=12000,DD_MAX=15000,DDi=1800,DT=300;
function qc(truck){ const dp=Math.min(DD_MAX,truck.price*.15); return{wk:(truck.price-dp)/52}; }
function fmt(n){ return '$'+Math.round(n).toLocaleString(); }
function stLbl(s){ return t({available:'sAvail',pending:'sPend',sold:'sSold'}[s]||s); }

function renderTrucks(){
  const sc=document.getElementById('trucksScroll');
  sc.innerHTML='';
  if(!trucks.length){ sc.innerHTML='<div style="padding:1rem;color:var(--su);font-size:.85rem">Нет доступных траков</div>'; return; }
  trucks.forEach(truck=>{
    const isSel=selId===truck.id;
    const{wk}=qc(truck);
    const ph=(truck.photos||[])[0];
    const phHTML=ph?`<img src="${ph}" alt="${truck.name}" onerror="this.parentNode.innerHTML='<div class=tcard-ph>🚛</div>'">`:'<div class="tcard-ph">🚛</div>';
    const card=document.createElement('div');
    card.className='tcard'+(truck.status==='sold'?' sold':'')+(isSel?' sel':'');
    card.onclick=()=>pick(truck.id);
    card.innerHTML=`<div class="tcard-photo">${phHTML}<div class="tcard-st"><span class="stag st-${truck.status}">${stLbl(truck.status)}</span></div>${isSel?'<div class="tcard-sel-ring"></div><div class="tcard-check">&#x2713;</div>':''}</div>
      <div class="tcard-body"><div class="tcard-name">${truck.name}</div><div class="tcard-det">${truck.detail}</div><div class="tcard-price">${fmt(truck.price)}</div><div class="tcard-wk">${fmt(wk)}/${t('colPmt').split('/')[1]||'wk'}</div></div>`;
    sc.appendChild(card);
  });
}

// ── Preview ──────────────────────────────────────────
function renderPreview(truck){
  const w=document.getElementById('previewImgWrap'), photos=truck.photos||[];
  const idx=Math.min(pidx,Math.max(0,photos.length-1));
  if(photos.length){
    const navHTML = photos.length>1 ? `<button class="pnav prev" onclick="pNav(-1)">&#10094;</button><button class="pnav next" onclick="pNav(1)">&#10095;</button><div class="pcnt">${idx+1}/${photos.length}</div><div class="pdots">${photos.map((_,i)=>`<div class="pdot${i===idx?' on':''}" onclick="pGo(${i})"></div>`).join('')}</div>` : '';
    w.innerHTML=`<img src="${photos[idx]}" alt="${truck.name}">${navHTML}`;
  } else { w.innerHTML='<div class="preview-ph">🚛</div>'; }
  document.getElementById('previewName').textContent=truck.name;
  document.getElementById('previewDet').textContent=truck.detail;
  document.getElementById('previewPrice').textContent=fmt(truck.price);
  document.getElementById('previewWrap').classList.add('vis');
}
function pNav(d){ const tr=trucks.find(x=>x.id===selId); if(!tr||!tr.photos.length)return; pidx=(pidx+d+tr.photos.length)%tr.photos.length; renderPreview(tr); }
function pGo(i){ pidx=i; const tr=trucks.find(x=>x.id===selId); if(tr)renderPreview(tr); }

function pick(id){
  const truck=trucks.find(x=>x.id===id);
  if(!truck||truck.status==='sold')return;
  selId=truck.id; pidx=0;
  renderTrucks(); renderPreview(truck); renderCalc(truck);
  document.getElementById('previewWrap').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showCalcPh(){
  document.getElementById('calcWrap').innerHTML=`<div class="calc-ph"><div class="calc-ph-icon">&#x261D;&#xFE0F;</div><p>${t('calcHint').replace('\n','<br>')}</p><span class="calc-ph-arrow">&#x2191;</span></div>`;
}

// ── Calculator ───────────────────────────────────────
function renderCalc(truck){
  const w=document.getElementById('calcWrap');
  const dpI=Math.min(DD_MAX,truck.price);
  function c(dp,gr,di,to){ const rem=truck.price-dp,wl=rem/52,f10=gr*.1; return{wl,f10,net:gr-f10-600-di-to-wl,rem}; }
  const r0=c(dpI,DG,DDi,DT);
  w.innerHTML=`
    <div class="calc-chip"><div class="calc-chip-name">${truck.name}</div><div class="calc-chip-price">${fmt(truck.price)}</div></div>
    <div class="net-hero">
      <div class="net-hero-left"><div class="lbl">${t('netLbl')}</div><div class="val" id="rn">${fmt(r0.net)}</div></div>
      <div class="net-hero-right"><div class="lbl">${t('wkLbl')}</div><div class="val" id="rlh">${fmt(r0.wl)}</div></div>
    </div>
    <div class="calc-body">
      <div class="cs"><div class="cl"><span class="cl-text">${t('dpLbl')}</span><span class="cl-val" id="dv">${fmt(dpI)}</span></div><input type="range" id="dp" min="5000" max="${truck.price}" step="500" value="${dpI}"><div class="ch"><span>$5,000</span><span>${fmt(truck.price)}</span></div></div>
      <div class="metrics"><div class="metric"><div class="metric-lbl">${t('balLbl')}</div><div class="metric-val" id="bv">${fmt(r0.rem)}</div></div><div class="metric"><div class="metric-lbl">${t('wkLbl')}</div><div class="metric-val" id="wv">${fmt(r0.wl)}</div></div></div>
      <hr class="hdivider">
      <div class="cs"><div class="cl"><span class="cl-text">${t('grossLbl')}</span><span class="cl-val" id="gv">${fmt(DG)}</span></div><input type="range" id="gr" min="9000" max="15000" step="100" value="${DG}"><div class="ch"><span>$9,000</span><span>$15,000</span></div></div>
      <div class="cs"><div class="cl"><span class="cl-text">${t('diesel')}</span><span class="cl-val" id="diev">${fmt(DDi)}</span></div><input type="range" id="di" min="1000" max="3000" step="50" value="${DDi}"><div class="ch"><span>$1,000</span><span>$3,000</span></div></div>
      <div class="cs"><div class="cl"><span class="cl-text">${t('tolls')}</span><span class="cl-val" id="tv">${fmt(DT)}</span></div><input type="range" id="to" min="0" max="1000" step="25" value="${DT}"><div class="ch"><span>$0</span><span>$1,000</span></div></div>
      <hr class="hdivider">
      <div class="sec-label" style="padding:0;margin-bottom:8px">${t('bkLbl')}</div>
      <div class="bk-row"><span class="l">${t('gross')}</span><span class="v pos" id="rg">${fmt(DG)}</span></div>
      <div class="bk-row"><span class="l">${t('fee')}</span><span class="v neg" id="rf">&#8722;${fmt(r0.f10)}</span></div>
      <div class="bk-row"><span class="l">${t('admin600')}</span><span class="v neg">&#8722;$600</span></div>
      <div class="bk-row"><span class="l">${t('diesel')}</span><span class="v neg" id="rdi">&#8722;${fmt(DDi)}</span></div>
      <div class="bk-row"><span class="l">${t('tolls')}</span><span class="v neg" id="rto">&#8722;${fmt(DT)}</span></div>
      <div class="bk-row"><span class="l">${t('trkPmt')}</span><span class="v neg" id="rl">&#8722;${fmt(r0.wl)}</span></div>
    </div>`;
  function upd(){
    const dp=+document.getElementById('dp').value,gr=+document.getElementById('gr').value,
          di=+document.getElementById('di').value,to=+document.getElementById('to').value,r=c(dp,gr,di,to);
    document.getElementById('dv').textContent=fmt(dp); document.getElementById('gv').textContent=fmt(gr);
    document.getElementById('diev').textContent=fmt(di); document.getElementById('tv').textContent=fmt(to);
    document.getElementById('bv').textContent=fmt(r.rem); document.getElementById('wv').textContent=fmt(r.wl);
    document.getElementById('rg').textContent=fmt(gr); document.getElementById('rf').textContent='\u2212'+fmt(r.f10);
    document.getElementById('rdi').textContent='\u2212'+fmt(di); document.getElementById('rto').textContent='\u2212'+fmt(to);
    document.getElementById('rl').textContent='\u2212'+fmt(r.wl); document.getElementById('rlh').textContent=fmt(r.wl);
    const ne=document.getElementById('rn'); ne.textContent=fmt(r.net); ne.style.color=r.net>=0?'var(--gr)':'var(--re)';
  }
  ['dp','gr','di','to'].forEach(id=>document.getElementById(id).addEventListener('input',upd));
}

          <option value="available"${truck?.status==='available'?' selected':''}>${t('sAvail')}</option>
          <option value="pending"${truck?.status==='pending'?' selected':''}>${t('sPend')}</option>
          <option value="sold"${truck?.status==='sold'?' selected':''}>${t('sSold')}</option>
        </select></div>
        <div class="ff full">
          <label>${t('fPhotos')}</label>
          ${existingHTML}
          <div class="dz" id="dz"><div class="dz-icon">&#x1F4F7;</div><div class="dz-main">Нажми или перетащи фото</div><div class="dz-sub">JPG · PNG · WEBP</div><input type="file" id="fi" accept="image/*" multiple style="display:none"></div>
          <div class="uq" id="uq"></div>
        </div>
      </div>
      <div style="display:flex;gap:7px;margin-top:10px">
        <button class="btn-or" id="sbtn" onclick="saveTruck()">${t('save')}</button>
        <button class="btn-sec" onclick="cancelForm()">${t('cancel')}</button>
      </div>
      <p id="fe" class="emsg"></p>
    </div>`;
  initDZ();
  fw.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function rmEx(i, url){
  const path=url.split('/'+BUCKET+'/')[1]; if(path) toDel.push(path);
  const tr=trucks.find(x=>x.id===editId); if(tr) tr.photos=tr.photos.filter(p=>p!==url);
  document.getElementById('ep'+i)?.remove();
}
function cancelForm(){ editId=null; uploadQ=[]; toDel=[]; const fw=document.getElementById('formWrap'); if(fw)fw.innerHTML=''; }

// ── Drop zone ────────────────────────────────────────
function initDZ(){
  const z=document.getElementById('dz'), inp=document.getElementById('fi'); if(!z||!inp)return;
  z.addEventListener('click',()=>inp.click());
  inp.addEventListener('change',()=>addFiles(inp.files));
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dz-over');});
  z.addEventListener('dragleave',e=>{if(!z.contains(e.relatedTarget))z.classList.remove('dz-over');});
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dz-over');addFiles(e.dataTransfer.files);});
}
function addFiles(files){
  Array.from(files).filter(f=>f.type.startsWith('image/')).forEach(file=>{
    uploadQ.push({file, prev:URL.createObjectURL(file), status:'pending', url:null, id:Math.random().toString(36).slice(2)});
  });
  renderUQ();
}
function renderUQ(){
  const c=document.getElementById('uq'); if(!c)return;
  c.innerHTML=uploadQ.map(it=>`<div class="uqi" id="uqi${it.id}"><img class="uqi-img" src="${it.prev}">
    ${it.status==='pending'?`<button class="uqi-rm" onclick="rmQ('${it.id}')">&#x2715;</button>`:''}
    ${it.status==='uploading'?`<div class="uqi-ov uqi-prog"><div class="uqi-bar"><div class="uqi-fill"></div></div></div>`:''}
    ${it.status==='done'?`<div class="uqi-ov uqi-done">&#x2713;</div>`:''}
    ${it.status==='error'?`<div class="uqi-ov uqi-err">ERR</div>`:''}
  </div>`).join('');
}
function rmQ(id){ uploadQ=uploadQ.filter(x=>x.id!==id); renderUQ(); }

async function uploadAll(){
  for(const it of uploadQ.filter(x=>x.status==='pending')){
    it.status='uploading'; renderUQ();
    try{ it.url=await stgUp(it.file); it.status='done'; }
    catch(e){ it.status='error'; console.error(e); }
    renderUQ();
  }
  return uploadQ.filter(x=>x.status==='done').map(x=>x.url);
}

// ── Save ─────────────────────────────────────────────
async function saveTruck(){
  const name=document.getElementById('fn').value.trim();
  const detail=document.getElementById('fd').value.trim();
  const price=parseFloat(document.getElementById('fp').value);
  const status=document.getElementById('fs').value;
  const err=document.getElementById('fe'); const btn=document.getElementById('sbtn');
  if(!name||!detail||isNaN(price)||price<=0){ err.textContent=t('fillAll'); return; }
  err.textContent=''; btn.disabled=true; btn.innerHTML=`<span class="spin"></span>${t('saving')}`;
  try{
    const newUrls = uploadQ.some(x=>x.status==='pending') ? await uploadAll() : [];
    if(toDel.length) await stgDel(toDel).catch(()=>{});
    const existing = editId?(trucks.find(x=>x.id===editId)?.photos||[]):[];
    const photos=[...existing,...newUrls];
    const payload={name,detail,price,status,photos};
    if(editId){
      await dbPatch(editId,payload);
      const i=trucks.findIndex(x=>x.id===editId); if(i>=0) trucks[i]={...trucks[i],...payload};
    } else {
      const [row]=await dbAdd(payload); trucks.push(row);
    }
    renderTrucks(); renderList(); cancelForm(); showToast(t('savedOk'));
    if(selId===editId){ const tr=trucks.find(x=>x.id===selId); if(tr)renderPreview(tr); }
  } catch(e){ err.textContent='Ошибка: '+e.message; }
  finally{ btn.disabled=false; btn.innerHTML=t('save'); }
}

// ── Delete ───────────────────────────────────────────
async function delTruck(id){
  if(!confirm(t('delCfm')))return;
  try{
    const tr=trucks.find(x=>x.id===id);
    if(tr?.photos?.length){
      const paths=tr.photos.map(u=>u.split('/'+BUCKET+'/')[1]).filter(Boolean);
      if(paths.length) await stgDel(paths).catch(()=>{});
    }
    await dbDel(id);
    trucks=trucks.filter(x=>x.id!==id);
    if(selId===id){ selId=null; document.getElementById('previewWrap').classList.remove('vis'); showCalcPh(); }
    renderTrucks(); renderList(); showToast(t('deletedOk'));
  } catch(e){ showToast('Ошибка: '+e.message); }
}

// ── Swipe preview ────────────────────────────────────
(function(){
  let sx=0;
  document.addEventListener('touchstart',e=>{const w=document.getElementById('previewImgWrap');if(w&&w.contains(e.target))sx=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',e=>{const w=document.getElementById('previewImgWrap');if(!w||!w.contains(e.target))return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)pNav(dx<0?1:-1);},{passive:true});
})();

// ── Secret admin: logo x5 tap OR press A+D+M ─────────
(function(){
  const ks=new Set();
  document.addEventListener('keydown',e=>{ks.add(e.key.toLowerCase());if(ks.has('a')&&ks.has('d')&&ks.has('m')){openAdmin();ks.clear();}});
  document.addEventListener('keyup',e=>ks.delete(e.key.toLowerCase()));
  let tps=0,tm;
  document.getElementById('logoTap').addEventListener('click',()=>{
    tps++;clearTimeout(tm);tm=setTimeout(()=>tps=0,3000);if(tps>=5){tps=0;openAdmin();}
  });
})();
document.getElementById('adminModal').addEventListener('click',function(e){if(e.target===this)closeAdmin();});

// ── Boot ─────────────────────────────────────────────
setLang('ru');
loadTrucks();
</script>
